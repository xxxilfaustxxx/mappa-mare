<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Batimetrica Adriatico PRO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #000814; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute; top: 10px; left: 60px;
            background: rgba(255, 255, 255, 0.9); padding: 12px;
            border-radius: 8px; z-index: 1000; font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 13px;
            max-width: 200px; border-left: 4px solid #0044ff;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="info-panel">
    <strong>Esploratore Fondali</strong><br>
    Dati: GEBCO & EMODnet<br>
    <small>Zoom disponibile fino a scala locale.</small>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // Inizializzazione
    const map = L.map('map', {
        maxZoom: 18, // Permettiamo uno zoom molto profondo
        minZoom: 5
    }).setView([42.5, 15.5], 7);

    // 1. NUOVO LAYER BASE: OpenStreetMap (Standard per vedere bene le coste quando zoomi)
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    });

    // 2. LAYER BATIMETRICO GEBCO (Più fluido di EMODnet e non dà errore zoom)
    const gebco = L.tileLayer.wms('https://www.gebco.net/data_and_products/gebco_web_services/web_map_service/mapserv?', {
        layers: 'gebco_latest',
        format: 'image/png',
        version: '1.3.0',
        attribution: 'GEBCO Bathymetry',
        opacity: 0.8
    }).addTo(map);

    // 3. LAYER EMODNET CONTORNI (Opzionale, lo mettiamo sopra)
    const contours = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:contours',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        opacity: 0.5
    }).addTo(map);

    // Aggiunta Ricerca
    L.Control.geocoder({ 
        defaultMarkGeocode: true,
        placeholder: "Cerca città o fossa..." 
    }).addTo(map);

    // Controllo livelli: puoi passare dalla vista "Solo Mare" alla vista "Mare + Città"
    const baseLayers = {
        "Profondità (GEBCO)": gebco,
        "Mappa Stradale (OSM)": osm
    };

    const overlays = {
        "Isolinee Profondità": contours
    };

    L.control.layers(baseLayers, overlays, { collapsed: false }).addTo(map);

    // Fix visualizzazione
    setTimeout(() => { map.invalidateSize(); }, 500);
</script>
</body>
</html>
