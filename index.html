<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Adriatico - Versione Ultra Stabile</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #f4f4f4; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        .info-panel {
            position: absolute; bottom: 30px; left: 20px;
            background: white; padding: 15px; border-radius: 10px;
            z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 280px; border-top: 5px solid #005f73;
        }

        /* FILTRO ALTO CONTRASTO: Rende i numeri della profondità neri e leggibili */
        .depth-layer {
            filter: contrast(150%) brightness(80%) saturate(0%);
        }

        /* NOMI CITTÀ: Neri e spessi per non confondersi con la costa */
        .leaflet-pane.leaflet-marker-pane span {
            color: #000 !important;
            font-weight: 900 !important;
            text-shadow: 2px 2px 0px white, -2px -2px 0px white;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="info-panel">
    <strong style="color: #005f73;">Profondità Reali (Metri)</strong><br>
    <p style="margin: 5px 0; font-size: 12px;">Zoomma per vedere i numeri della profondità (es: 5, 10, 15) scritti sul mare.</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { 
        maxZoom: 16, 
        minZoom: 7 
    }).setView([45.4, 13.0], 9);

    // 1. BASE: Mappa Grigia (Neutra)
    const base = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    // 2. LAYER COLORI MARE (EMODnet - Caricato come immagine semplice, molto veloce)
    const seaColors = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        opacity: 0.6
    }).addTo(map);

    // 3. LAYER NUMERI E LINEE (Esri Ocean Reference)
    // Usiamo la versione "Tile" che è istantanea e non va mai in timeout
    const oceanData = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', {
        className: 'depth-layer', // Applichiamo il filtro nero
        opacity: 1,
        attribution: 'Esri, GEBCO'
    }).addTo(map);

    // 4. ETICHETTE CITTÀ (Forzate sopra i colori)
    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'markerPane'
    }).addTo(map);

    // Controllo Layer
    const overlays = {
        "Colori Mare": seaColors,
        "Numeri e Linee (Neri)": oceanData,
        "Nomi Città": labels
    };
    L.control.layers(null, overlays, { collapsed: false }).addTo(map);

</script>
</body>
</html>
