<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Batimetrica Adriatico - Definitiva</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #001529; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9); padding: 12px;
            border-radius: 8px; z-index: 1000; font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 13px;
            border-left: 4px solid #0044ff;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="info-panel">
    <strong>Batimetria Adriatico (EMODnet)</strong><br>
    Sfumature di profondità ad alta risoluzione.<br>
    <small>Usa il selettore in alto a dx per le strade.</small>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // Inizializzazione mappa
    const map = L.map('map', {
        maxZoom: 18,
        minZoom: 5
    }).setView([42.5, 15.5], 7);

    // 1. LAYER BASE STRADALE (Sotto, opzionale)
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    });

    // 2. LAYER BASE SCURO (Ottimo per contrasto)
    const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    // 3. LAYER BATIMETRICO EMODNET (SERVER ALTERNATIVO - PIÙ STABILE)
    // Questo server usa i "Tasselli" (Tiles) invece del protocollo WMS, evitando il grigio
    const emodnetTiles = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        attribution: 'EMODnet Bathymetry',
        opacity: 0.8,
        maxZoom: 15
    }).addTo(map);

    // 4. LAYER CONTORNI (ISOLINEE)
    const emodnetContours = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:contours',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        opacity: 0.6
    }).addTo(map);

    // Barra di ricerca
    L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

    // Controllo livelli
    const baseLayers = {
        "Sfondo Scuro": dark,
        "Mappa Stradale": osm
    };

    const overlays = {
        "Batimetria (Sfumature)": emodnetTiles,
        "Isolinee (Linee)": emodnetContours
    };

    L.control.layers(baseLayers, overlays, { collapsed: false }).addTo(map);

    // Fix per caricamento
    setTimeout(() => { map.invalidateSize(); }, 500);
</script>
</body>
</html>
