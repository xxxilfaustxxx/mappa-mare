<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Batimetrica Adriatico - Dati Reali</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        .info-panel {
            position: absolute; bottom: 30px; left: 20px;
            background: white; padding: 12px; border-radius: 8px;
            z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 250px; border-left: 5px solid #0055ff;
        }

        /* Nomi città: neri, spessi e con bordo bianco per massima leggibilità */
        .leaflet-pane.leaflet-marker-pane span {
            color: #000 !important;
            font-weight: 900 !important;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;
            font-size: 13px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="info-panel">
    <strong>Batimetria & Numeri (m)</strong><br>
    <p style="font-size: 11px; margin: 5px 0;">Zoomma sulla costa per vedere le cifre della profondità e le boe.</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inizializzazione centrata su Caorle/Bibione (dove avevi lo zoom prima)
    const map = L.map('map', { 
        maxZoom: 18, 
        minZoom: 8 
    }).setView([45.58, 12.88], 12);

    // 1. BASE: OpenStreetMap (Sbiadito al 50% per non disturbare il mare)
    const baseOSM = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        opacity: 0.5
    }).addTo(map);

    // 2. LAYER COLORI MARE (EMODnet - Il fondale colorato)
    const bathyColors = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        opacity: 0.8,
        attribution: 'EMODnet'
    }).addTo(map);

    // 3. LAYER DATI NAUTICI (OpenSeaMap - Numeri, Boe, Isobate nere)
    // Questo layer "disegna" i metri direttamente sopra l'acqua
    const seaMarks = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
        attribution: 'OpenSeaMap'
    }).addTo(map);

    // 4. ETICHETTE CITTÀ (Forzate sopra tutto)
    const cityLabels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'markerPane'
    }).addTo(map);

    // Menu di controllo (In alto a destra)
    const overlays = {
        "Colori Fondale": bathyColors,
        "Numeri & Segnali (Nautici)": seaMarks,
        "Nomi Città": cityLabels
    };
    L.control.layers(null, overlays, { collapsed: false }).addTo(map);

</script>
</body>
</html>
