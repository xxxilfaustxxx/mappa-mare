<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plotter Nautico Mediterraneo - Google Full</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; font-family: 'Segoe UI', sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        /* Legenda */
        .legend {
            position: absolute; bottom: 40px; right: 20px;
            background: white; padding: 12px; border-radius: 8px;
            z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 11px; border-top: 5px solid #00b4d8;
        }
        .legend h4 { margin: 0 0 8px 0; font-size: 13px; color: #0077b6; text-align: center; }
        .legend div { display: flex; align-items: center; margin-bottom: 2px; }
        .legend i { width: 25px; height: 12px; margin-right: 8px; border: 0.5px solid #ccc; }

        /* Display Coordinate Live */
        .coords-display {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.8); color: #00ff00; padding: 5px 12px;
            border-radius: 4px; font-family: 'Courier New', monospace; font-size: 13px; z-index: 1001;
            border: 1px solid #333;
        }

        /* Pannello Strumenti Sinistro */
        .side-tools {
            position: absolute; top: 150px; left: 10px;
            z-index: 1000; display: flex; flex-direction: column; gap: 8px;
        }
        .tool-btn {
            background: white; width: 36px; height: 36px;
            border-radius: 4px; border: 2px solid rgba(0,0,0,0.2);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .tool-btn:hover { background: #f4f4f4; color: #0077b6; }

        /* Filtro Mare */
        .sea-layer { filter: saturate(150%) contrast(110%); }

        /* Etichette città */
        .leaflet-pane.leaflet-marker-pane span {
            color: #000 !important; font-weight: 900 !important;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff;
            font-size: 12px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="coords" class="coords-display">Lat: 0.00000, Lon: 0.00000</div>

<div class="side-tools">
    <div class="tool-btn" onclick="getLocation()" title="La mia posizione">🎯</div>
    <div class="tool-btn" onclick="clearAllWaypoints()" title="Cancella Waypoints" style="color:red;">📍🗑️</div>
    <div class="tool-btn" id="clear-routes-btn" title="Cancella Rotte" style="color:#0077b6;">📏🗑️</div>
</div>

<div class="legend">
    <h4>Profondità (m)</h4>
    <div><i style="background: #e0f2f1"></i> 0 - 10 m</div>
    <div><i style="background: #b2ebf2"></i> 10 - 20 m</div>
    <div><i style="background: #80deea"></i> 20 - 30 m</div>
    <div><i style="background: #4dd0e1"></i> 30 - 40 m</div>
    <div><i style="background: #26c6da"></i> 40 - 50 m</div>
    <div><i style="background: #00bcd4"></i> 50 - 60 m</div>
    <div><i style="background: #00acc1"></i> 60 - 70 m</div>
    <div><i style="background: #0097a7"></i> 70 - 80 m</div>
    <div><i style="background: #00838f"></i> 80 - 90 m</div>
    <div><i style="background: #006064"></i> 90 - 100 m</div>
    <div><i style="background: #01579b"></i> > 100 m</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>

<script>
    // Inizializzazione mappa
    const map = L.map('map', { maxZoom: 19, minZoom: 4 }).setView([42.0, 14.0], 6);

    // GOOGLE LAYERS
    const googleStreets = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: '© Google Maps'
    }).addTo(map);

    const googleHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
    });

    // LAYER MARE
    const bathy = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        className: 'sea-layer', opacity: 0.8
    }).addTo(map);

    const seaMarks = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png').addTo(map);

    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'markerPane'
    }).addTo(map);

    L.control.layers({ "Google Stradale": googleStreets, "Google Satellite": googleHybrid }, 
                     { "Profondità (Colore)": bathy, "Dati Nautici": seaMarks, "Nomi Località": labels }, { collapsed: false }).addTo(map);

    // --- CONFIGURAZIONE RIGHELLO CORRETTA (Miglia Nautiche & Metri) ---
    const polylineMeasure = L.control.polylineMeasure({
        position: 'topleft',
        unit: 'nauticalmiles', // Unità primaria: Miglia Nautiche
        showBearings: true,     // Mostra la prua (gradi)
        bearingTextIn: 'In entrata',
        bearingTextOut: 'In uscita',
        tooltipTextDragandadd: 'Trascina e aggiungi',
        tooltipTextResume: 'Riprendi linea',
        tooltipTextAdd: 'Aggiungi punto',
        clearControlTitle: 'Cancella misurazioni'
    }).addTo(map);

    // Pulsante cancellazione rotte
    document.getElementById('clear-routes-btn').onclick = function() {
        polylineMeasure._clearAllMeasurements();
    };

    // RICERCA E COORDINATE
    L.Control.geocoder({ placeholder: "Cerca porto..." }).addTo(map);
    map.on('mousemove', function(e) {
        document.getElementById('coords').innerHTML = `LAT: ${e.latlng.lat.toFixed(5)} | LON: ${e.latlng.lng.toFixed(5)}`;
    });

    // WAYPOINTS
    let waypointGroup = L.layerGroup().addTo(map);
    map.on('contextmenu', function(e) {
        const waypoint = L.marker(e.latlng, { draggable: true }).addTo(waypointGroup);
        const update = (ll) => {
            waypoint.bindPopup(`<b>Punto Nave</b><br>LAT: ${ll.lat.toFixed(5)}<br>LON: ${ll.lng.toFixed(5)}<br><small style="color:red;">Doppio click per eliminare</small>`).openPopup();
        };
        update(e.latlng);
        waypoint.on('dblclick', () => waypointGroup.removeLayer(waypoint));
        waypoint.on('dragend', (ev) => update(ev.target.getLatLng()));
    });

    function clearAllWaypoints() {
        if(confirm("Vuoi cancellare tutti i Waypoint?")) waypointGroup.clearLayers();
    }

    function getLocation() {
        map.locate({setView: true, maxZoom: 15});
        map.on('locationfound', (e) => {
            L.circle(e.latlng, e.accuracy, {color: '#0077b6', fillOpacity: 0.1}).addTo(map);
            L.marker(e.latlng).addTo(map).bindPopup("Sei qui").openPopup();
        });
    }
</script>
</body>
</html>
