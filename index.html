<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Batimetrica Adriatico</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #001529; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute; bottom: 30px; left: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 8px; z-index: 1000; font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); max-width: 260px;
        }
        .legend-panel {
            position: absolute; bottom: 30px; right: 20px;
            background: white; padding: 10px; border-radius: 8px;
            z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="info-panel">
    <h3 style="margin:0 0 10px 0;">Batimetria Adriatico</h3>
    <p style="font-size: 13px; margin: 0;">📍 Clicca per la profondità.<br>🔍 Cerca in alto a destra.</p>
</div>

<div class="legend-panel">
    <img src="https://tiles.emodnet-bathymetry.eu/wms?service=WMS&version=1.3.0&request=GetLegendGraphic&layer=emodnet:mean&format=image/png" alt="Legenda">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // Inizializzazione con CRS standard Web Mercator (più compatibile)
    const map = L.map('map').setView([42.5, 15.5], 7);

    // 1. Mappa di base (Sempre visibile)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    // 2. LAYER BATIMETRICO (Configurazione semplificata per evitare blocchi)
    const bathyLayer = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:mean',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        opacity: 0.7,
        attribution: 'EMODnet'
    }).addTo(map);

    // 3. LAYER CONTORNI
    const contoursLayer = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:contours',
        format: 'image/png',
        transparent: true,
        version: '1.3.0'
    }).addTo(map);

    // Ricerca
    L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

    // Funzione profondità migliorata
    map.on('click', function(e) {
        const b = map.getBounds();
        const size = map.getSize();
        const url = `https://tiles.emodnet-bathymetry.eu/wms?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetFeatureInfo&LAYERS=emodnet:mean&QUERY_LAYERS=emodnet:mean&BBOX=${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}&FEATURE_COUNT=1&HEIGHT=${size.y}&WIDTH=${size.x}&INFO_FORMAT=application/json&CRS=EPSG:4326&I=${Math.floor(map.latLngToContainerPoint(e.latlng).x)}&J=${Math.floor(map.latLngToContainerPoint(e.latlng).y)}`;

        const p = L.popup().setLatLng(e.latlng).setContent("Misuro...").openOn(map);

        fetch(url)
            .then(res => res.json())
            .then(d => {
                if(d.features && d.features.length > 0) {
                    const depth = Math.abs(parseFloat(d.features[0].properties.value)).toFixed(1);
                    p.setContent(`Profondità: ${depth} m`);
                } else { p.setContent("Nessun dato qui."); }
            }).catch(() => p.setContent("Errore server. Riprova."));
    });

    // Controllo livelli
    L.control.layers(null, {"Sfumatura Mare": bathyLayer, "Linee Profondità": contoursLayer}).addTo(map);

    // Forza caricamento tiles
    setTimeout(() => { map.invalidateSize(); }, 500);
</script>
</body>
</html>
