<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Adriatico Alta Definizione</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; font-family: 'Segoe UI', sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        /* Pannello Leggibile */
        .info-panel {
            position: absolute; bottom: 30px; left: 20px;
            background: white; padding: 15px; border-radius: 12px;
            z-index: 1000; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            max-width: 250px; border: 2px solid #0044ff;
        }

        /* Forza la leggibilità dei nomi città (Nero su Bianco) */
        .leaflet-pane.leaflet-marker-pane span, 
        .leaflet-pane.leaflet-tooltip-pane {
            color: #000 !important;
            font-weight: 900 !important;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;
            font-size: 13px;
        }

        /* Etichetta profondità manuale nera */
        .depth-tag {
            background: #000; color: #fff; padding: 2px 5px;
            border-radius: 4px; font-size: 11px; font-weight: bold;
            border: 1px solid white;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="info-panel">
    <h3 style="margin:0; font-size: 16px; color: #0044ff;">Batimetria Costa Adriatica</h3>
    <p style="font-size: 12px; color: #333;">Le linee scure indicano i 5, 10 e 20m.<br>I nomi delle città sono ora in grassetto.</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // Inizializzazione centrata sulla costa
    const map = L.map('map', { maxZoom: 17, minZoom: 7 }).setView([44.2, 12.6], 9);

    // 1. Layer Stradale (Giorno - Molto chiaro per contrasto)
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

    // 2. Layer Base Professionale (Chiaro)
    const lightBase = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    // 3. Batimetria a Colori (EMODnet)
    const bathyTiles = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        opacity: 0.7
    }).addTo(map);

    // 4. ISOLINEE MARCATE (Forziamo la visibilità)
    const contours = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:contours',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        opacity: 1, // Massima opacità per le linee
        styles: 'default' 
    }).addTo(map);

    // 5. Etichette Città (Forzate sopra tutto)
    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'markerPane'
    }).addTo(map);

    // 6. Punti di Sondaggio Costa (Esempi fissi visibili subito)
    const costalDepths = [
        {lat: 44.15, lng: 12.55, val: "8m"},   // Rimini
        {lat: 44.45, lng: 12.40, val: "6m"},   // Ravenna
        {lat: 45.10, lng: 12.45, val: "12m"},  // Chioggia
        {lat: 45.70, lng: 13.20, val: "5m"},   // Lignano
        {lat: 42.48, lng: 14.25, val: "10m"}   // Pescara
    ];

    costalDepths.forEach(p => {
        L.marker([p.lat, p.lng], {
            icon: L.divIcon({ className: 'depth-tag', html: p.val, iconSize: [30, 18] })
        }).addTo(map);
    });

    // Barra di Ricerca
    L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

    // Switcher Livelli
    const baseMaps = { "Mappa Chiara": lightBase, "Mappa Stradale": osm };
    const overlays = { "Colori Mare": bathyTiles, "Linee Fondale": contours, "Città": labels };
    L.control.layers(baseMaps, overlays, { collapsed: false }).addTo(map);

    setTimeout(() => { map.invalidateSize(); }, 500);
</script>
</body>
</html>
