<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Adriatico - Alto Contrasto</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #fff; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        /* Pannello Info Leggibile */
        .info-panel {
            position: absolute; bottom: 20px; left: 20px;
            background: white; padding: 12px 16px; border-radius: 8px;
            z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-left: 6px solid #0044ff;
        }

        /* Etichetta Profondità (Corretta per sovrascrivere le impostazioni standard di Leaflet) */
        .depth-tag {
            background: #000 !important; 
            color: #fff !important; 
            padding: 2px 6px;
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: bold;
            border: 1px solid white !important; /* !important per sovrascrivere Leaflet */
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            /* Fondamentale: rimuove lo sfondo bianco di default di L.divIcon */
            background-color: transparent !important; 
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="info-panel">
    <h3 style="margin:0 0 5px 0; font-size: 15px;">Batimetria Costa Adriatica</h3>
    <p style="font-size: 11px; color: #444; margin:0;">Contrasto aumentato per i bassi fondali.</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // Inizializzazione centrata su zona Ravenna/Rimini
    const map = L.map('map', { maxZoom: 16, minZoom: 7 }).setView([44.3, 12.6], 9);

    // 1. Layer Stradale (OSM)
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    });

    // 2. Base Chiara (Per contrasto col mare)
    const lightBase = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CartoDB'
    }).addTo(map);

    // 3. LAYER MARE (Rimosso il filtro CSS che causava linee bianche tra le tile)
    // Nota: opacità a 1 nasconderà la mappa chiara sotto, poiché EMODnet disegna anche la terraferma.
    const bathyTiles = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        attribution: 'EMODnet Bathymetry',
        opacity: 0.9 // Leggermente ridotta per far "trasparire" i dettagli della terra se necessario
    }).addTo(map);

    // 4. LAYER ISOLINEE (Usata versione WMS 1.1.1 per migliore compatibilità con Leaflet)
    const contours = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:contours',
        format: 'image/png',
        transparent: true,
        version: '1.1.1', // Migliore per proiezione EPSG:3857 di default di Leaflet
        opacity: 0.8
    }).addTo(map);

    // 5. Etichette Città (Rimosso "pane: markerPane" perché è un layer raster e va nel overlay di default)
    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'overlayPane' // Esplicito ma è quello di default
    }).addTo(map);

    // 6. Punti Sondaggio Fissi
    const points = [
        {lat: 45.43, lng: 12.45, val: "2m"},   // Venezia Laguna
        {lat: 44.15, lng: 12.65, val: "10m"},  // Al largo Rimini
        {lat: 43.62, lng: 13.55, val: "15m"},  // Ancona
        {lat: 44.80, lng: 13.50, val: "35m"},  // Al largo Croazia
        {lat: 45.75, lng: 13.15, val: "4m"}    // Marano Lagunare
    ];

    points.forEach(p => {
        L.marker([p.lat, p.lng], {
            icon: L.divIcon({ 
                className: 'depth-tag', 
                html: p.val, 
                iconSize: [35, 20],
                iconAnchor: [17.5, 10] // Centra il punto esattamente sulle coordinate
            })
        }).addTo(map);
    });

    // Barra di Ricerca
    L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

    // Selettore livelli
    const baseMaps = { 
        "Mappa Chiara": lightBase, 
        "Mappa Stradale": osm 
    };
    const overlays = { 
        "Colori Mare (Batimetria)": bathyTiles, 
        "Linee Fondale (Isobate)": contours, 
        "Nomi Città": labels 
    };
    
    L.control.layers(baseMaps, overlays, { collapsed: false }).addTo(map);

    // Forza il ridimensionamento se la mappa viene caricata in un container nascosto/dinamico
    setTimeout(() => { map.invalidateSize(); }, 500);
</script>
</body>
</html>
