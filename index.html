<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Adriatico - Versione Finale Stabile</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #000b1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        .info-panel {
            position: absolute; bottom: 30px; left: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 10px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 260px; border-left: 5px solid #0044ff;
        }

        /* Etichette Profondità Personalizzate */
        .depth-label {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #fff;
            border-radius: 3px;
            color: #fff;
            font-weight: bold;
            font-size: 10px;
            padding: 1px 3px;
            text-align: center;
        }

        /* Nomi città neri e leggibili */
        .leaflet-pane.leaflet-marker-pane span {
            color: black !important;
            font-weight: 800 !important;
            text-shadow: 1px 1px 0px white, -1px -1px 0px white, 1px -1px 0px white, -1px 1px 0px white;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="info-panel">
    <h3 style="margin:0 0 5px 0; font-size: 16px; color: #003366;">Batimetria & Distanze</h3>
    <p style="font-size: 12px; margin: 0 0 8px 0;">Le linee bianche indicano i 10, 20, 50 e 100m.</p>
    <small style="display: block; margin-top: 5px; color: #555;">Usa la barra di ricerca per trovare secche o porti.</small>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    const map = L.map('map', {
        maxZoom: 17,
        minZoom: 6
    }).setView([44.5, 13.5], 8);

    // 1. Layer Stradale (Giorno)
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    });

    // 2. Layer Scuro (Base Notte)
    const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    // 3. Batimetria a Colori (EMODnet)
    const bathyTiles = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        attribution: 'EMODnet',
        opacity: 0.8
    }).addTo(map);

    // 4. Linee di Profondità (Isobate)
    const contours = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:contours',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        opacity: 0.6
    }).addTo(map);

    // 5. Etichette Città Leggibili
    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'markerPane'
    }).addTo(map);

    // 6. PUNTI DI PROFONDITÀ FISSI (Manual Sondaggi)
    // Ho inserito alcuni punti chiave dove i numeri saranno SEMPRE visibili
    const depthPoints = L.layerGroup();
    const soundings = [
        {lat: 45.2, lng: 12.8, val: "15m"},
        {lat: 44.8, lng: 13.2, val: "28m"},
        {lat: 44.1, lng: 12.8, val: "12m"},
        {lat: 43.8, lng: 13.8, val: "55m"},
        {lat: 43.1, lng: 15.2, val: "240m"}, // Fossa del Pomo
        {lat: 41.8, lng: 17.5, val: "1200m"} // Fossa Sud
    ];

    soundings.forEach(s => {
        L.marker([s.lat, s.lng], {
            icon: L.divIcon({
                className: 'depth-label',
                html: s.val,
                iconSize: [35, 15]
            })
        }).addTo(depthPoints);
    });
    depthPoints.addTo(map);

    // BARRA DI RICERCA
    L.Control.geocoder({ defaultMarkGeocode: true, position: 'topright' }).addTo(map);

    // SWITCHER LIVELLI
    const baseMaps = { "Mappa Notte": dark, "Mappa Giorno": osm };
    const overlays = { 
        "Sfumature Mare": bathyTiles, 
        "Linee Profondità": contours,
        "Punti Sondaggio": depthPoints,
        "Nomi Città": labels 
    };
    L.control.layers(baseMaps, overlays, { collapsed: false }).addTo(map);

    // FIX PER MOBILE
    setTimeout(() => { map.invalidateSize(); }, 500);
</script>
</body>
</html>
