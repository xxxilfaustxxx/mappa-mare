<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Adriatico - Alto Contrasto</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #fff; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        /* Pannello Info Leggibile */
        .info-panel {
            position: absolute; bottom: 20px; left: 20px;
            background: white; padding: 12px; border-radius: 8px;
            z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-left: 6px solid #0044ff;
        }

        /* FILTRO PER RENDERE IL MARE MENO SBIADITO */
        .high-contrast-sea {
            filter: contrast(130%) brightness(95%) saturate(120%);
        }

        /* NOMI CITTÀ: NERI, GRANDI E MARCATI */
        .leaflet-pane.leaflet-marker-pane span {
            color: #000 !important;
            font-weight: 900 !important;
            font-size: 14px !important;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;
            text-transform: uppercase;
        }
        
        /* Etichetta Profondità */
        .depth-tag {
            background: #000; color: #fff; padding: 2px 6px;
            border-radius: 4px; font-size: 12px; font-weight: bold;
            border: 1px solid white; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="info-panel">
    <h3 style="margin:0; font-size: 15px;">Batimetria Costa Adriatica</h3>
    <p style="font-size: 11px; color: #444;">Contrasto aumentato per i bassi fondali.</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // Inizializzazione centrata su zona Ravenna/Rimini (test acqua bassa)
    const map = L.map('map', { maxZoom: 16, minZoom: 7 }).setView([44.3, 12.6], 9);

    // 1. Layer Stradale (OSM) - Per vedere bene i porti
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

    // 2. Base Chiara (Per contrasto col mare)
    const lightBase = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    // 3. LAYER MARE AD ALTO CONTRASTO (XYZ Tiles - Non sbiadisce)
    const bathyTiles = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        className: 'high-contrast-sea',
        attribution: 'EMODnet',
        opacity: 1
    }).addTo(map);

    // 4. LAYER ISOLINEE ALTERNATIVO (Più stabile)
    const contours = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:contours',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        opacity: 0.8
    }).addTo(map);

    // 5. Etichette Città (Nere e leggibili)
    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'markerPane'
    }).addTo(map);

    // 6. Punti Sondaggio Fissi (Sempre visibili vicino alla costa)
    const points = [
        {lat: 45.43, lng: 12.45, val: "2m"},   // Venezia Laguna
        {lat: 44.15, lng: 12.65, val: "10m"},  // Al largo Rimini
        {lat: 43.62, lng: 13.55, val: "15m"},  // Ancona
        {lat: 44.80, lng: 13.50, val: "35m"},  // Al largo Croazia
        {lat: 45.75, lng: 13.15, val: "4m"}    // Marano Lagunare
    ];

    points.forEach(p => {
        L.marker([p.lat, p.lng], {
            icon: L.divIcon({ className: 'depth-tag', html: p.val, iconSize: [35, 20] })
        }).addTo(map);
    });

    // Barra di Ricerca
    L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

    // Selettore livelli
    const baseMaps = { "Mappa Chiara": lightBase, "Mappa Stradale": osm };
    const overlays = { "Colori Mare": bathyTiles, "Linee Fondale (Isobate)": contours, "Nomi Città": labels };
    L.control.layers(baseMaps, overlays, { collapsed: false }).addTo(map);

    setTimeout(() => { map.invalidateSize(); }, 500);
</script>
</body>
</html>
