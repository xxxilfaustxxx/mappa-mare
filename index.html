<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Batimetrica Adriatico - Versione Integrale</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #001524; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        .info-box {
            position: absolute; bottom: 25px; left: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 15px; 
            border-radius: 10px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            max-width: 260px; font-size: 13px; border-left: 5px solid #0077b6;
        }
        /* Rende i nomi delle città neri e leggibili */
        .leaflet-pane.leaflet-shadow-pane span {
            color: #000 !important;
            font-weight: bold !important;
            text-shadow: 1px 1px 2px white;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="info-box">
    <strong style="font-size: 15px; color: #0077b6;">Mappa Nautica Adriatico</strong><br>
    <p style="margin: 5px 0;">I numeri indicano la profondità (metri).<br>Le linee indicano le isobate mondiali.</p>
    <small>Zoomma sulle coste per i dettagli delle secche.</small>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inizializzazione: centrato sull'Adriatico centrale
    const map = L.map('map', { 
        maxZoom: 18, 
        minZoom: 6,
        zoomControl: true 
    }).setView([43.0, 15.0], 7);

    // 1. BASE: Mappa Chiara (per far risaltare il mare)
    const base = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    // 2. LAYER COLORI FONDALE (EMODnet - XYZ Tiles, infallibile)
    const bathyColors = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        opacity: 0.75,
        attribution: '© EMODnet'
    }).addTo(map);

    // 3. LAYER LINEE E NUMERI (Esri Ocean Reference - Copre tutto l'Adriatico)
    // Questo layer contiene le isobate mondiali e i nomi delle fosse
    const oceanRef = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', {
        opacity: 0.9,
        attribution: '© Esri, GEBCO'
    }).addTo(map);

    // 4. LAYER NAUTICO (OpenSeaMap - Per vedere i numeri delle secche e le boe)
    const seaMarks = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
        attribution: '© OpenSeaMap'
    }).addTo(map);

    // 5. NOMI CITTÀ (Sempre in primo piano)
    const cityLabels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'shadowPane'
    }).addTo(map);

    // CONTROLLO LIVELLI (In alto a destra)
    const overlays = {
        "Sfumature Profondità": bathyColors,
        "Linee Isobate (Esri)": oceanRef,
        "Dati Nautici/Boe": seaMarks,
        "Nomi Città": cityLabels
    };
    L.control.layers(null, overlays, { collapsed: false }).addTo(map);

</script>
</body>
</html>
