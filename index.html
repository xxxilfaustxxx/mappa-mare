<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Batimetrica Adriatico - Numeri Chiari</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #001529; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        .info-panel {
            position: absolute; bottom: 30px; left: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 10px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 240px; border-top: 5px solid #0044ff;
        }
        /* Forza la visibilità delle etichette delle città */
        .leaflet-pane.leaflet-marker-pane img {
            filter: brightness(0) saturate(100%); /* Rende i nomi delle città neri intensi */
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="info-panel">
    <h3 style="margin:0 0 5px 0; font-size: 16px;">Batimetria con Numeri</h3>
    <p style="font-size: 12px; margin: 0 0 10px 0; color: #444;">Zoomma sulla costa per vedere i metri scritti sulle linee (Isobate).</p>
    <small>Se non vedi i numeri, prova ad attivare il layer "Numeri (GEBCO)" dal menu a destra.</small>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    const map = L.map('map', {
        maxZoom: 18,
        minZoom: 6
    }).setView([44.1, 12.6], 9); // Centrato sulla costa Romagnola (acqua bassa) per test immediato

    // 1. Layer Stradale (OSM)
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

    // 2. Layer Scuro Base
    const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // 3. Colori Mare (EMODnet)
    const bathyTiles = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        attribution: 'EMODnet',
        opacity: 0.8
    }).addTo(map);

    // 4. NUOVO LAYER: Numeri e Contorni GEBCO (Più leggibili)
    const gebcoContours = L.tileLayer.wms('https://www.gebco.net/data_and_products/gebco_web_services/web_map_service/mapserv?', {
        layers: 'gebco_latest_contours',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        opacity: 0.9,
        attribution: 'GEBCO'
    }).addTo(map);

    // 5. Contorni EMODnet (Linee bianche sottili di supporto)
    const emodnetContours = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:contours',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        opacity: 0.5
    }).addTo(map);

    // 6. Etichette Città (Nere e marcate)
    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'markerPane'
    }).addTo(map);

    // Barra di Ricerca
    L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

    // Switcher Livelli
    const baseLayers = { "Mappa Scura": dark, "Mappa Giorno": osm };
    const overlays = { 
        "Colori Mare": bathyTiles, 
        "Numeri Profondità": gebcoContours,
        "Linee Supporto": emodnetContours,
        "Nomi Città": labels 
    };
    L.control.layers(baseLayers, overlays, { collapsed: false }).addTo(map);

    setTimeout(() => { map.invalidateSize(); }, 500);
</script>
</body>
</html>
