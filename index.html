<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediterraneo - Batimetria + Google Maps</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; font-family: 'Segoe UI', sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        /* LEGENDA SCALA 10m */
        .legend {
            position: absolute; bottom: 30px; right: 20px;
            background: white; padding: 12px; border-radius: 8px;
            z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 11px; border-top: 5px solid #00b4d8;
        }
        .legend h4 { margin: 0 0 8px 0; font-size: 13px; color: #0077b6; text-align: center; }
        .legend div { display: flex; align-items: center; margin-bottom: 2px; }
        .legend i { width: 25px; height: 12px; margin-right: 8px; border: 0.5px solid #ccc; }

        /* Filtro Saturazione per far risaltare il mare sopra Google Maps */
        .sea-layer { filter: saturate(150%) contrast(110%); }

        /* Etichette città */
        .leaflet-pane.leaflet-marker-pane span {
            color: #000 !important;
            font-weight: 900 !important;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="legend">
    <h4>Profondità (m)</h4>
    <div><i style="background: #e0f2f1"></i> 0 - 10 m</div>
    <div><i style="background: #b2ebf2"></i> 10 - 20 m</div>
    <div><i style="background: #80deea"></i> 20 - 30 m</div>
    <div><i style="background: #4dd0e1"></i> 30 - 40 m</div>
    <div><i style="background: #26c6da"></i> 40 - 50 m</div>
    <div><i style="background: #00bcd4"></i> 50 - 60 m</div>
    <div><i style="background: #00acc1"></i> 60 - 70 m</div>
    <div><i style="background: #0097a7"></i> 70 - 80 m</div>
    <div><i style="background: #00838f"></i> 80 - 90 m</div>
    <div><i style="background: #006064"></i> 90 - 100 m</div>
    <div><i style="background: #01579b"></i> > 100 m</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    const map = L.map('map', { 
        maxZoom: 20, // Google supporta zoom più alti
        minZoom: 4 
    }).setView([38.0, 15.0], 5);

    // --- 1. LAYER GOOGLE MAPS ---
    const googleStreets = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
        maxZoom: 20,
        subdomains:['mt0','mt1','mt2','mt3'],
        attribution: '© Google Maps'
    }).addTo(map);

    const googleHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{
        maxZoom: 20,
        subdomains:['mt0','mt1','mt2','mt3'],
        attribution: '© Google Maps Satellite'
    });

    const osmRoads = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

    // --- 2. LAYER MARE (EMODnet) ---
    const bathy = L.tileLayer('https://tiles.emodnet-bathymetry.eu/2020/baselayer/web_mercator/{z}/{x}/{y}.png', {
        className: 'sea-layer',
        opacity: 0.75 // Leggermente più trasparente per vedere Google sotto
    }).addTo(map);

    // --- 3. LAYER DATI NAUTICI (OpenSeaMap) ---
    const seaMarks = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png').addTo(map);

    // --- 4. ETICHETTE ---
    const cityLabels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'markerPane'
    }).addTo(map);

    // --- CONTROLLO LIVELLI ---
    const baseMaps = {
        "Google Maps (Strade)": googleStreets,
        "Google Maps (Satellite)": googleHybrid,
        "OpenStreetMap": osmRoads
    };

    const overlays = {
        "Colori Profondità (10m)": bathy,
        "Numeri & Isobate": seaMarks,
        "Nomi Città": cityLabels
    };

    L.control.layers(baseMaps, overlays, { collapsed: false }).addTo(map);

    // --- BARRA DI RICERCA ---
    L.Control.geocoder({
        defaultMarkGeocode: true,
        placeholder: "Cerca località...",
    }).addTo(map);

</script>
</body>
</html>
