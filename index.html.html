<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Batimetrica Professionale Adriatico</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; background: #001529; cursor: crosshair; }
        
        /* Pannello informativo (Sinistra) */
        .info-panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 260px;
            border-left: 5px solid #0056b3;
        }
        
        /* Pannello Legenda (Destra) */
        .legend-panel {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 8px;
            z-index: 1000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 0.85em;
        }
        .legend-panel h4 { margin: 0 0 8px 0; color: #333; font-size: 14px;}
        .legend-panel img { max-height: 200px; display: block; }
        
        /* Personalizzazione barra di ricerca per farla risaltare */
        .leaflet-control-geocoder {
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3) !important;
        }

        .leaflet-popup-content { font-weight: bold; text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="info-panel">
    <h3 style="margin-top:0; color: #002244; font-size: 18px;">Esploratore Adriatico</h3>
    <p style="margin: 5px 0;">Dati: <strong>EMODnet Bathymetry</strong></p>
    <p style="font-size: 0.9em; color: #444; margin: 5px 0;">📍 <strong>Clicca</strong> per la profondità.<br>🔍 <strong>Cerca</strong> località in alto a dx.</p>
</div>

<div class="legend-panel">
    <h4>Scala Profondità (m)</h4>
    <img src="https://tiles.emodnet-bathymetry.eu/wms?service=WMS&version=1.3.0&request=GetLegendGraphic&layer=emodnet:mean&format=image/png" alt="Legenda EMODnet">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // 1. Inizializzazione mappa
    const map = L.map('map', {
        zoomControl: true
    }).setView([42.5, 15.5], 7);

    // 2. Layer di base (Dark Matter per contrasto)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    // 3. Layer Batimetrico EMODnet
    const bathyLayer = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:mean',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        attribution: 'EMODnet Bathymetry',
        opacity: 0.75
    }).addTo(map);

    // 4. Layer Isolinee (Contorni)
    const contoursLayer = L.tileLayer.wms('https://tiles.emodnet-bathymetry.eu/wms', {
        layers: 'emodnet:contours',
        format: 'image/png',
        transparent: true,
        version: '1.3.0'
    }).addTo(map);

    // 5. BARRA DI RICERCA (Geocoder)
    const geocoder = L.Control.geocoder({
        defaultMarkGeocode: false,
        placeholder: "Cerca luogo o costa...",
        errorMessage: "Località non trovata."
    })
    .on('markgeocode', function(e) {
        const center = e.geocode.center;
        map.setView(center, 10); // Zoomma sulla località trovata
        L.marker(center).addTo(map)
            .bindPopup(e.geocode.name)
            .openPopup();
    })
    .addTo(map);

    // 6. Funzione al click per misurare la profondità
    map.on('click', function(e) {
        const sw = map.getBounds().getSouthWest();
        const ne = map.getBounds().getNorthEast();
        const size = map.getSize();
        
        const url = `https://tiles.emodnet-bathymetry.eu/wms?` +
                    `SERVICE=WMS&VERSION=1.3.0&REQUEST=GetFeatureInfo&` +
                    `LAYERS=emodnet:mean&QUERY_LAYERS=emodnet:mean&` +
                    `BBOX=${sw.lat},${sw.lng},${ne.lat},${ne.lng}&` +
                    `FEATURE_COUNT=1&HEIGHT=${size.y}&WIDTH=${size.x}&` +
                    `INFO_FORMAT=application/json&CRS=EPSG:4326&` +
                    `I=${Math.floor(e.containerPoint.x)}&J=${Math.floor(e.containerPoint.y)}`;

        const popup = L.popup()
            .setLatLng(e.latlng)
            .setContent("Analisi fondale...")
            .openOn(map);

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.features && data.features.length > 0) {
                    const depth = data.features[0].properties.value;
                    const cleanDepth = Math.abs(parseFloat(depth)).toFixed(1);
                    popup.setContent(`Profondità: <span style="color:#0056b3">${cleanDepth} m</span>`);
                } else {
                    popup.setContent("Dato non disponibile sulla terraferma.");
                }
            })
            .catch(err => {
                console.error(err);
                popup.setContent("Errore di connessione al server.");
            });
    });

    // 7. Controllo dei livelli (Layer Switcher)
    const overlays = {
        "Sfumatura Batimetrica": bathyLayer,
        "Isolinee (100m+)": contoursLayer
    };
    L.control.layers(null, overlays, { position: 'topleft' }).addTo(map);

</script>

</body>
</html>
